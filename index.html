<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI文字起こしアプリ</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="文字起こし">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .interim { color: #9ca3af; }
        #status.active { color: #ef4444; font-weight: bold; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="safari-alert" class="hidden fixed inset-0 z-[100] bg-slate-900/90 flex items-center justify-center p-6 text-center">
        <div class="bg-white rounded-3xl p-8 max-w-sm shadow-2xl">
            <div class="text-4xl mb-4">⚠️</div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Safariで開いてください</h2>
            <p class="text-slate-600 text-sm mb-6">iPhoneの仕様により、音声認識はSafari以外のブラウザでは動作しません。</p>
            <button id="copy-url-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mb-3 active:scale-95 transition-all">URLをコピーする</button>
        </div>
    </div>

    <div class="flex-grow max-w-2xl mx-auto w-full p-4 flex flex-col">
        <header class="py-4 text-center">
            <h1 class="text-2xl font-extrabold text-slate-800">🎤 Dictation Commands</h1>
            <div id="status" class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Ready</div>
        </header>
        
        <div class="flex justify-around text-[10px] text-slate-400 mb-2 border-b border-slate-100 pb-2">
            <span>「まる」→ 。</span>
            <span>「てん」→ 、</span>
            <span>「かいぎょう」→ 改行</span>
        </div>

        <div id="result-container" class="flex-grow bg-white shadow-inner rounded-3xl p-6 overflow-y-auto mb-6 border border-slate-200 text-lg leading-relaxed text-slate-700">
            <span id="final-span"></span>
            <span id="interim-span" class="interim"></span>
        </div>

        <div class="grid grid-cols-3 gap-3 pb-8">
            <button id="clear-btn" class="bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl active:scale-95 transition-all text-sm">消去</button>
            <button id="start-btn" class="col-span-2 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">録音開始</button>
            <button id="stop-btn" class="hidden col-span-2 bg-red-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">停止</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        if (isIos && !isSafari && !isStandalone) {
            document.getElementById('safari-alert').classList.remove('hidden');
            document.getElementById('copy-url-btn').onclick = () => {
                navigator.clipboard.writeText(location.href).then(() => {
                    document.getElementById('copy-url-btn').innerText = "コピーしました！";
                });
            };
        }

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const clearBtn = document.getElementById('clear-btn');
            const finalSpan = document.getElementById('final-span');
            const interimSpan = document.getElementById('interim-span');

            let finalTranscript = '';

            startBtn.onclick = () => {
                recognition.start();
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
            };

            stopBtn.onclick = () => {
                recognition.stop();
                stopBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
            };

            clearBtn.onclick = () => {
                if(confirm("消去しますか？")) {
                    finalTranscript = '';
                    finalSpan.innerHTML = '';
                    interimSpan.innerHTML = '';
                }
            };

            // 【肝】音声コマンドの置換ロジック
            function applyCommands(text) {
                return text
                    .replace(/まる|マル/g, '。')
                    .replace(/てん|テン/g, '、')
                    .replace(/かいぎょう|改行/g, '<br>');
            }

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    let transcript = event.results[i][0].transcript;
                    
                    if (event.results[i].isFinal) {
                        // 確定した瞬間にコマンドを適用
                        finalTranscript += applyCommands(transcript);
                    } else {
                        // 認識途中もコマンドを適用して表示
                        interimTranscript = applyCommands(transcript);
                    }
                }
                finalSpan.innerHTML = finalTranscript;
                interimSpan.innerHTML = interimTranscript;
                document.getElementById('result-container').scrollTop = document.getElementById('result-container').scrollHeight;
            };
        }
    </script>
</body>
</html>
