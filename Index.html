<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI文字起こしアプリ</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="文字起こし">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .interim { color: #9ca3af; }
        #status.active { color: #ef4444; font-weight: bold; }
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div id="safari-alert" class="hidden fixed inset-0 z-[100] bg-slate-900/90 flex items-center justify-center p-6 text-center">
        <div class="bg-white rounded-3xl p-8 max-w-sm shadow-2xl">
            <div class="text-4xl mb-4">⚠️</div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Safariで開いてください</h2>
            <p class="text-slate-600 text-sm mb-6">iPhoneの仕様により、音声認識はSafari以外のブラウザ（Chrome等）では動作しません。</p>
            
            <button id="copy-url-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mb-3 active:scale-95 transition-all">
                URLをコピーする
            </button>
            <p class="text-xs text-slate-400">コピー後、Safariを起動して貼り付けてください</p>
        </div>
    </div>

    <div class="flex-grow max-w-2xl mx-auto w-full p-4 flex flex-col">
        <header class="py-4 text-center">
            <h1 class="text-2xl font-extrabold text-slate-800">🎤 Realtime Dictation</h1>
            <div id="status" class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Ready</div>
        </header>
        
        <div id="result-container" class="flex-grow bg-white shadow-inner rounded-3xl p-6 overflow-y-auto mb-6 border border-slate-200 text-lg leading-relaxed text-slate-700">
            <span id="final-span"></span>
            <span id="interim-span" class="interim"></span>
        </div>

        <div class="grid grid-cols-3 gap-3 pb-8">
            <button id="clear-btn" class="bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl hover:bg-slate-300 active:scale-95 transition-all">
                消去
            </button>
            <button id="start-btn" class="col-span-2 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all text-lg">
                録音開始
            </button>
            <button id="stop-btn" class="hidden col-span-2 bg-red-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
                停止
            </button>
        </div>
    </div>

    <div id="ios-guide" class="hidden fixed bottom-10 left-4 right-4 bg-slate-800 text-white p-5 rounded-2xl shadow-2xl z-50">
        <div class="flex items-start gap-4">
            <div class="text-2xl">📲</div>
            <div class="flex-grow text-sm">
                <p class="font-bold mb-1">アプリとしてインストール</p>
                <p class="opacity-80">下の<strong>共有ボタン</strong>から<strong>「ホーム画面に追加」</strong>を選択すると全画面で使えます。</p>
            </div>
            <button onclick="document.getElementById('ios-guide').remove()" class="text-slate-400">✕</button>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        // 【判定ロジック】iPhoneかつSafariでない場合にアラートを表示
        if (isIos && !isSafari && !isStandalone) {
            const alertBox = document.getElementById('safari-alert');
            alertBox.classList.remove('hidden');

            document.getElementById('copy-url-btn').onclick = () => {
                navigator.clipboard.writeText(location.href).then(() => {
                    document.getElementById('copy-url-btn').innerText = "コピーしました！";
                    document.getElementById('copy-url-btn').classList.replace('bg-blue-600', 'bg-green-600');
                });
            };
        }

        if (!SpeechRecognition) {
            // Safari以外への警告は上記で行うため、ここはPC等の非対応ブラウザ用
            if(!isIos) alert("音声認識非対応のブラウザです。Chrome等をお試しください。");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const clearBtn = document.getElementById('clear-btn');
            const finalSpan = document.getElementById('final-span');
            const interimSpan = document.getElementById('interim-span');
            const status = document.getElementById('status');

            let finalTranscript = '';

            startBtn.onclick = () => {
                recognition.start();
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                status.innerText = "🔴 Listening...";
            };

            stopBtn.onclick = () => {
                recognition.stop();
                stopBtn.classList.add('hidden');
                startBtn.classList.remove('hidden');
                status.innerText = "Stopped";
            };

            clearBtn.onclick = () => {
                if(confirm("消去しますか？")) {
                    finalTranscript = '';
                    finalSpan.innerHTML = '';
                    interimSpan.innerHTML = '';
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + '。' + '<br>';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                finalSpan.innerHTML = finalTranscript;
                interimSpan.innerHTML = interimTranscript;
                document.getElementById('result-container').scrollTop = document.getElementById('result-container').scrollHeight;
            };

            // PWAガイド表示
            if (isIos && isSafari && !isStandalone) {
                document.getElementById('ios-guide').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
